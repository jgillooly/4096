<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2048</title>

  <link href="style/main.css" rel="stylesheet" type="text/css">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="meta/apple-touch-icon.png">
  <link rel="apple-touch-startup-image" href="meta/apple-touch-startup-image-640x1096.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)"> <!-- iPhone 5+ -->
  <link rel="apple-touch-startup-image" href="meta/apple-touch-startup-image-640x920.png"  media="(device-width: 320px) and (device-height: 480px) and (-webkit-device-pixel-ratio: 2)"> <!-- iPhone, retina -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <meta name="HandheldFriendly" content="True">
  <meta name="MobileOptimized" content="320">
  <meta name="viewport" content="width=device-width, target-densitydpi=160dpi, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui">
</head>
<body>
    <div class="before-game">
     <p>Which Mode Would You Like to Play?</p> 
     <button id="easy-mode-button">Easy Mode</button>
     <button id="hard-mode-button">Hard Mode</button>
     <div class="time-options">
      <input type="radio" id="time-option-0" name="time-option" value="none" checked><label for="time-option-0">No Time Mode</label></radio>
      <input type="radio" id="time-option-1" name="time-option" value="countup"><label for="time-option-1">Time Trial</label></radio>
      <input type="radio" id="time-option-2" name="time-option" value="countdown"><label for="time-option-2">Time Limit</label></radio>
      <br>
      <label for="time-limit-input">Time Limit:</label>
      <input type="number" id="time-limit-input" placeholder="Enter time limit in minutes" min="1">
     </div>
  </div>

  <script>
    // Save chosen mode and navigate to index.html
    function choose(mode) {
      try { 
        localStorage.setItem('gridMode', mode); 
        localStorage.setItem('timeOption', document.querySelector('input[name="time-option"]:checked').value);
        console.println("Chosen Time Option:", document.querySelector('input[name="time-option"]:checked').value); // Debugging line to check chosen time option
        const timeLimit = document.getElementById('time-limit-input').value;
        if (document.querySelector('input[name="time-option"]:checked').value === 'countdown' && timeLimit) {
          localStorage.setItem('timeLimit', timeLimit);
        }
      } catch(e) {}
      window.location = 'index.html';
    }
    document.getElementById('easy-mode-button').addEventListener('click', function(){ choose('easy'); });
    document.getElementById('hard-mode-button').addEventListener('click', function(){ choose('hard'); });
  </script>

  <script src="js/bind_polyfill.js"></script>
  <script src="js/classlist_polyfill.js"></script>
  <script src="js/animframe_polyfill.js"></script>
  <script src="js/keyboard_input_manager.js"></script>
  <script src="js/html_actuator.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/tile.js"></script>
  <script src="js/local_storage_manager.js"></script>
  <script src="js/game_manager.js"></script>
  <script src="js/application.js"></script>


</body>
</html>
